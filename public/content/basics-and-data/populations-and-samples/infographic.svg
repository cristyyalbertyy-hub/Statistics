<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <rect width="720" height="400" rx="12" fill="#1e2430"/>
  <text x="360" y="48" text-anchor="middle" fill="#eef1f6" font-family="Georgia, serif" font-size="22" font-weight="600">Populations and Samples</text>
  <ellipse cx="180" cy="200" rx="120" ry="80" stroke="#7ba3d4" stroke-width="2" fill="rgba(123,163,212,0.1)"/>
  <text x="180" y="195" text-anchor="middle" fill="#9aa8be" font-family="sans-serif" font-size="14">Population</text>
  <text x="180" y="215" text-anchor="middle" fill="#6b7a92" font-family="sans-serif" font-size="11">All individuals of interest</text>
  <circle cx="480" cy="200" r="55" stroke="#7ba3d4" stroke-width="2" fill="rgba(123,163,212,0.2)"/>
  <text x="480" y="195" text-anchor="middle" fill="#9aa8be" font-family="sans-serif" font-size="14">Sample</text>
  <text x="480" y="215" text-anchor="middle" fill="#6b7a92" font-family="sans-serif" font-size="11">Subset studied</text>
  <path d="M300 200 H380" stroke="#4a6fa5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="185" text-anchor="middle" fill="#7ba3d4" font-family="sans-serif" font-size="11">random selection</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#4a6fa5"/>
    </marker>
  </defs>
  <text x="360" y="360" text-anchor="middle" fill="#6b7a92" font-family="sans-serif" font-size="12">Inference: sample statistics ’ population parameters</text>
</svg>
